<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2236"/>
      <stop offset="55%" stop-color="#0f1623"/>
      <stop offset="100%" stop-color="#070b14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e5c47a"/>
      <stop offset="50%" stop-color="#c9a55c"/>
      <stop offset="100%" stop-color="#a88243"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a88243"/>
      <stop offset="50%" stop-color="#f4d98a"/>
      <stop offset="100%" stop-color="#a88243"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle inner border for depth -->
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#1f2a40" stroke-width="1" opacity="0.5"/>

  <!-- Top thin gold line -->
  <rect x="186" y="138" width="140" height="1.5" fill="url(#goldShine)" opacity="0.85"/>

  <!-- TC monogram — drawn as paths for maximum compatibility -->
  <!-- Letter T -->
  <g fill="url(#gold)">
    <!-- T horizontal bar -->
    <rect x="140" y="190" width="116" height="20" rx="2"/>
    <!-- T vertical stem -->
    <rect x="188" y="190" width="20" height="160" rx="2"/>
    <!-- T serif decorations - left -->
    <rect x="136" y="190" width="6" height="14"/>
    <rect x="252" y="190" width="6" height="14"/>
    <!-- T base serifs -->
    <rect x="178" y="346" width="40" height="6" rx="1"/>
  </g>

  <!-- Letter C -->
  <g fill="url(#gold)">
    <!-- C curve via thick stroke -->
    <path d="M 380 220
             Q 380 195, 355 188
             Q 330 182, 312 195
             Q 282 215, 282 270
             Q 282 325, 312 345
             Q 330 358, 355 352
             Q 380 345, 380 320"
          fill="none"
          stroke="url(#gold)"
          stroke-width="22"
          stroke-linecap="round"/>
    <!-- C top serif tip -->
    <circle cx="370" cy="215" r="6"/>
    <!-- C bottom serif tip -->
    <circle cx="370" cy="325" r="6"/>
  </g>

  <!-- Bottom thin gold line -->
  <rect x="186" y="394" width="140" height="1.5" fill="url(#goldShine)" opacity="0.85"/>

  <!-- "DEVELOPMENT" microtext -->
  <text x="256" y="430" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="14" font-weight="500" fill="#c9a55c"
        letter-spacing="6" opacity="0.85">DEVELOPMENT</text>
</svg>
